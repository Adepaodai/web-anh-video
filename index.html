<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mạng Ảnh Và Video Giống Flickr</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Mạng chia sẻ ảnh & video ngắn</h1>
    <input type="file" id="chon-file" accept="image/*,video/*">
    <div id="kho-chua-mang" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div>
    <script>
        const SUPABASE_URL = "https://" + "yndazipatpzmffitvqo" + ".supabase.co";
        const SUPABASE_KEY = "sb_publishable_VJn-S8BB7tP-bpWLsYY8QQ__EmspkUF";
        const khoFlickr = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const nutChonFile = document.getElementById('chon-file');
        const khoChuaMang = document.getElementById('kho-chua-mang');
        async function taiDuLieu() {
            khoChuaMang.innerHTML = '<p>Đang tải danh sách ảnh và video...</p>';
           const { data, error } = await khoFlickr.storage.from('flickr-data').list();
            
            if (error) {
                khoChuaMang.innerHTML = '<p>Lỗi tải dữ liệu từ đám mây: ' + error.message + '</p>';
                return;
            }
            khoChuaMang.innerHTML = '';
            if (data && data.length > 0) {
                data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                data.forEach(file => {
                    if (file.name === '.emptyFolderPlaceholder') return;
                    
                    const { data: urlData } = khoFlickr.storage.from('flickr-data').getPublicUrl(file.name);
                    const fileUrl = urlData.publicUrl;
                    if (file.name.match(/\.(mp4|webm|mov|avi)$/i)) {
                        const videoCard = document.createElement('div');
                        videoCard.innerHTML = `<video src="${fileUrl}" style="width:100%; border-radius:8px;" controls muted></video>`;
                        khoChuaMang.appendChild(videoCard);
                    } else {
                        const imgCard = document.createElement('div');
                        imgCard.innerHTML = `<img src="${fileUrl}" style="width:100%; border-radius:8px; object-fit:cover;">`;
                        khoChuaMang.appendChild(imgCard);
                    }
                });
            } else {
                khoChuaMang.innerHTML = '<p>Chưa có ảnh hoặc video nào. Hãy là người đầu tiên đăng nhé!</p>';
            }
        }
        nutChonFile.addEventListener('change', async function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const file = files[0]; 
                const fileName = Date.now() + "_" + file.name;
                
                alert("Đang tải file lên mạng Internet, đợi vài giây nhé...");
                const { data, error } = await khoFlickr.storage.from('flickr-data').upload(fileName, file);
                
                if (error) {
                    alert("Lỗi đăng file lên đám mây: " + error.message);
                } else {
                    alert("Tuyệt vời quá! File của bạn đã được đăng lên mạng Internet thành công rồi ạ!");
                    nutChonFile.value = '';
                    taiDuLieu();
                }
            }
        });

        // Tự động chạy tải ảnh ngay khi vừa mở web
        taiDuLieu();
    </script>
</body>
</html>
