<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mạng Ảnh Và Video Giống Flickr</title>
    <!-- Nhúng thư viện Supabase gốc viết thường để máy tính nhận diện -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Mạng chia sẻ ảnh & video ngắn</h1>
    
    <!-- Nút chọn ảnh hoặc video ngắn -->
    <input type="file" id="chon-file" accept="image/*,video/*">
    
    <!-- Kho hiển thị ảnh và video -->
    <div id="kho-chua-mang" style="margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div>

    <script>
        // Địa chỉ kết nối tự động lấy từ chìa khóa bảo mật Vercel truyền vào
        const SUPABASE_URL = "https://ynrdazipatpzmffitvqo.supabase.co";
        const SUPABASE_KEY = "sb_publishable_VJn-S8BB7tP-bpWLsYY8QQ__EmspkUF";
        
        // Sửa vế sau thành chữ viết thường toàn bộ theo đúng chuẩn Google tra cứu
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const nutChonFile = document.getElementById('chon-file');
        const khoChuaMang = document.getElementById('kho-chua-mang');

        // Hàm tải và hiện toàn bộ ảnh/video từ mạng về màn hình
        async function taiDuLieu() {
            khoChuaMang.innerHTML = '<p>Đang tải danh sách ảnh và video...</p>';
            const { data, error } = await supabase.storage.from('flickr-data').list();
            
            if (error) {
                khoChuaMang.innerHTML = '<p>Lỗi tải dữ liệu: ' + error.message + '</p>';
                return;
            }
            
            khoChuaMang.innerHTML = '';
            if (data && data.length > 0) {
                data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                
                data.forEach(file => {
                    if (file.name === '.emptyFolderPlaceholder') return;
                    
                    const { data: urlData } = supabase.storage.from('flickr-data').getPublicUrl(file.name);
                    const fileUrl = urlData.publicUrl;
                    
                    if (file.name.match(/\.(mp4|webm|mov|avi)$/i)) {
                        const videoCard = document.createElement('div');
                        videoCard.innerHTML = `<video src="${fileUrl}" style="width:100%; border-radius:8px;" controls muted></video>`;
                        khoChuaMang.appendChild(videoCard);
                    } else {
                        const imgCard = document.createElement('div');
                        imgCard.innerHTML = `<img src="${fileUrl}" style="width:100%; border-radius:8px; object-fit:cover;">`;
                        khoChuaMang.appendChild(imgCard);
                    }
                });
            } else {
                khoChuaMang.innerHTML = '<p>Chưa có ảnh hoặc video nào. Chú hãy là người đầu tiên đăng nhé!</p>';
            }
        }

        // Lắng nghe lệnh khi bấm nút đăng file
        nutChonFile.addEventListener('change', async function(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                const file = files[0]; 
                const fileName = Date.now() + "_" + file.name;
                
                alert("Đang tải file lên mạng Internet, chú đợi vài giây nhé...");
                
                const { data, error } = await supabase.storage.from('flickr-data').upload(fileName, file);
                
                if (error) {
                    alert("Lỗi đăng file: " + error.message);
                } else {
                    alert("Tuyệt vời quá chú ơi! File của chú đã được đăng lên mạng Internet thành công rồi ạ!");
                    nutChonFile.value = '';
                    taiDuLieu();
                }
            }
        });

        // Tự động chạy tải ảnh ngay khi vừa mở web
        taiDuLieu();
    </script>
</body>
</html>
